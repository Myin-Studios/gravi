- name: "Install LLVM 21 (Linux)"
  if: "runner.os == 'Linux'"
  run: |
    wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
    sudo add-apt-repository "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-21 main"
    sudo apt-get update -qq
    sudo apt-get install -y llvm-21-dev libpolly-21-dev
    echo "LLVM_SYS_211_STATIC=1" >> $GITHUB_ENV
    echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV
  shell: "bash"
- name: "Install LLVM 21 (macOS)"
  if: "runner.os == 'macOS'"
  run: |
    brew install llvm@21 || true
    echo "LLVM_SYS_211_STATIC=1" >> $GITHUB_ENV
    echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> $GITHUB_ENV
  shell: "bash"
- name: "Cache LLVM static build (Windows)"
  id: "llvm-cache"
  uses: "actions/cache@v4"
  if: "runner.os == 'Windows'"
  with:
    "key": "llvm-21.1.0-static-windows-x64-v4"
    "path": "C:\\llvm-static"
- name: "Build LLVM statically (Windows)"
  if: "runner.os == 'Windows' && steps.llvm-cache.outputs.cache-hit != 'true'"
  run: |
    $ver = "21.1.0"
    Invoke-WebRequest `
      "https://github.com/llvm/llvm-project/archive/llvmorg-$ver.tar.gz" `
      -OutFile llvm.tar.gz
    tar -xf llvm.tar.gz
    cmake `
      -S "llvm-project-llvmorg-$ver/llvm" -B llvm-build `
      -DCMAKE_BUILD_TYPE=Release `
      -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
      -DBUILD_SHARED_LIBS=OFF `
      -DLLVM_BUILD_LLVM_DYLIB=OFF `
      -DLLVM_INCLUDE_TESTS=OFF `
      -DLLVM_INCLUDE_EXAMPLES=OFF `
      -DLLVM_INCLUDE_BENCHMARKS=OFF `
      -DLLVM_TARGETS_TO_BUILD="X86;AArch64" `
      -DCMAKE_INSTALL_PREFIX="C:\llvm-static"
      -DLLVM_TARGETS_TO_BUILD="all"
    cmake --build llvm-build --config Release --target install -- /m
  shell: "pwsh"
- name: "Set LLVM static prefix (Windows)"
  if: "runner.os == 'Windows'"
  run: |
    echo "LLVM_SYS_211_PREFIX=C:/llvm-static" >> $GITHUB_ENV
    echo "LLVM_SYS_211_STATIC=1" >> $GITHUB_ENV
  shell: "bash"